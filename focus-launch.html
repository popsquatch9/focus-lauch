ion:12,type:"build",content:"Every login page, search box, and contact form is built with HTML form tags. <input>, <textarea>, <button> — these are the basic tools.",project:'Build a mini contact form:\n\n<form>\n  <label>Name: <input type="text"></label>\n  <label>Email: <input type="email"></label>\n  <button>Submit</button>\n</form>\n\nStyle note: it won\'t actually send anything yet. That\'s JavaScript\'s job (next track).',recallQ:["What HTML element creates a text input?","What wraps all form elements?"]}]},{id:"css-basics",title:"CSS: Make It Look Right",description:"CSS is how you control color, spacing, layout, and everything visual.",lessons:[{id:"css-1",title:"Selectors and Properties",duration:10,type:"build",content:'CSS works like this: select something, then change it. "h1 { color: red; }" means "find all h1 tags and make them red."',project:'Create style.css next to your hello.html. Add:\n\nbody { background: #111; color: #eee; font-family: monospace; }\nh1 { color: #f5a623; }\n\nLink it in your HTML: <link rel="stylesheet" href="style.css">\n\nYour page now has a dark theme.',recallQ:["How do you link a CSS file to HTML?",'What does the "color" property change?']},{id:"css-2",title:"The Box Model",duration:12,type:"read",content:"Everything in CSS is a box. Every box has: content, padding (space inside), border, and margin (space outside). This is the foundation of all layout.",project:'Add a styled card to your page:\n\n.card {\n  background: #222;\n  padding: 20px;\n  margin: 20px 0;\n  border-left: 4px solid #f5a623;\n}\n\nWrap some content in <div class="card">. Inspect it in browser dev tools (F12 > click element).',recallQ:["What is the difference between margin and padding?","What are the four parts of the CSS box model?"]},{id:"css-3",title:"Flexbox: The Layout System",duration:15,type:"build",content:'Flexbox is the modern way to put things side-by-side or space them out. "display: flex" turns a container into a flexbox. Then use justify-content and align-items to control placement.',project:'Build a nav bar:\n\n<nav class="nav">\n  <span>Scott\'s Site</span>\n  <div>\n    <a href="#">Home</a>\n    <a href="#">Projects</a>\n    <a href="#">Contact</a>\n  </div>\n</nav>\n\n.nav { display: flex; justify-content: space-between; padding: 16px; background: #1a1a1a; }',recallQ:["What CSS property enables flexbox?","What does justify-content do?"]}]},{id:"js-basics",title:"JavaScript: Make It Do Things",description:"JavaScript is what makes pages interactive. Click a button, something happens — that's JS.",lessons:[{id:"js-1",title:"Variables and the Console",duration:8,type:"practice",content:'Open your browser, hit F12, go to Console. This is your playground. JS lets you store data in variables: let name = "Scott". Then use it: console.log(name).',project:'In the browser console, type:\n\nlet name = "Scott"\nlet year = 2025\nconsole.log("Hi " + name + ", welcome to " + year)\n\nThen try: let age = 50; console.log(age * 2)\n\nThe console is your scratchpad. Use it daily.',recallQ:["What keyword creates a variable?","What does console.log() do?"]},{id:"js-2",title:"Functions: Reusable Actions",duration:10,type:"practice",content:'A function is a named block of code you can run over and over. You define it once, call it many times. function greet(name) { return "Hello " + name; }',project:'In the console:\n\nfunction energyCheck(level) {\n  if (level >= 4) return "High focus session — let\'s build!"\n  if (level >= 2) return "Medium — do one small thing"\n  return "Low — just read for 5 min"\n}\n\nconsole.log(energyCheck(5))\nconsole.log(energyCheck(1))',recallQ:["What keyword defines a function?",'What does "return" do in a function?']},{id:"js-3",title:"DOM: Control the Page",duration:15,type:"build",content:'The DOM (Document Object Model) is JS\'s view of your HTML. You can select elements and change them. document.querySelector("h1").textContent = "Changed!" — that\'s how interactive pages work.',project:'Add to your hello.html:\n\n<button id="btn">Click me</button>\n<p id="output">Nothing yet</p>\n\n<script>\n  document.getElementById("btn").addEventListener("click", function() {\n    document.getElementById("output").textContent = "You clicked it! JS is working.";\n  })\n<\/script>',recallQ:["What does document.querySelector do?","What is addEventListener used for?"]}]}]},{id:"dev-tools",title:"Developer Tools",emoji:"🛠️",color:"#3b82f6",description:"Git, the command line, and VS Code — the tools every developer uses daily.",modules:[{id:"git-basics",title:"Git: Never Lose Your Work",description:"Git is version control — a time machine for your code. Every developer uses it.",lessons:[{id:"git-1",title:"What Git actually is",duration:8,type:"read",content:"Git tracks every change you make to your code. You can go back in time, work on separate \"branches,\" and collaborate. It's not optional in 2025 — it's infrastructure.",project:"Install Git from git-scm.com if you haven't. Then open Terminal (Mac) or Git Bash (Windows) and run:\n\ngit --version\n\nYou should see a version number. That's all — you confirmed it's installed.",recallQ:["What is the main purpose of Git?","What command checks if Git is installed?"]},{id:"git-2",title:"Your first repository",duration:12,type:"build",content:'A repository (repo) is just a folder Git is tracking. You initialize it, then "commit" snapshots of your work.',project:'In terminal, navigate to your hello.html folder:\n\ngit init\ngit add .\ngit commit -m "First commit: my first webpage"\n\ngit log\n\nYou just saved a snapshot in time.',recallQ:["What does git init do?","What is a commit?"]},{id:"git-3",title:"GitHub: Your work on the internet",duration:15,type:"build",content:"GitHub stores your repos online. Free. Create an account, make a repo, push your code up. Now your work is backed up and shareable.",project:'1. Create account at github.com\n2. Click "New Repository" > name it "learning-journey"\n3. Follow the instructions to push your existing code:\n\ngit remote add origin [your github URL]\ngit push -u origin main\n\nYour code is now live on the internet.',recallQ:["What is the difference between Git and GitHub?","What does git push do?"]}]}]},{id:"web3",title:"Web3 & Blockchain",emoji:"⛓️",color:"#a855f7",description:"Understand how blockchains work, what crypto actually is, and how wallets work.",modules:[{id:"blockchain-basics",title:"How Blockchains Actually Work",description:"Strip away the hype and understand the actual technology.",lessons:[{id:"bc-1",title:"The ledger problem",duration:10,type:"read",content:"A blockchain solves one problem: how do strangers trust a shared record without a central authority? A blockchain is a ledger (list of transactions) that's copied across thousands of computers simultaneously. To change it, you'd have to change it on most of them at once — practically impossible.",project:"Go to etherscan.io. Search for any Ethereum address. You can see every transaction that address has ever made — public, permanent, and immutable. This is the blockchain in action.",recallQ:["What problem does a blockchain solve?","Why is a blockchain hard to tamper with?"]},{id:"bc-2",title:"Wallets, keys, and addresses",duration:12,type:"read",content:"A crypto wallet does not store coins. It stores two keys: a public key (your address, shareable like an email) and a private key (your password — never share this). The blockchain records that address X has Y coins. Your wallet just proves you own address X.",project:"Install MetaMask (metamask.io) as a browser extension. Create a new wallet. Write down your seed phrase and store it somewhere safe — not digitally. This is your gateway to Web3.",recallQ:["What does a crypto wallet actually store?","What is the difference between a public and private key?"]},{id:"bc-3",title:"What is a smart contract?",duration:10,type:"read",content:'A smart contract is code that lives on the blockchain. When triggered, it executes automatically — no middleman. "If X happens, then do Y" — permanently, publicly, unstoppably. This is the foundation of DeFi, NFTs, DAOs, and everything you\'ll build.',project:"Go to remix.ethereum.org — this is a browser-based Ethereum development environment. Look around. You'll be writing code here soon. Just explore today.",recallQ:["What is a smart contract?",'What makes smart contracts "trustless"?']}]}]},{id:"solidity",title:"Smart Contracts",emoji:"📜",color:"#f59e0b",description:"Write Solidity code and deploy your first smart contracts to the blockchain.",modules:[{id:"solidity-basics",title:"Your First Smart Contract",description:"Solidity is the language of Ethereum. You'll write real contracts in Remix.",lessons:[{id:"sol-1",title:"Solidity structure",duration:12,type:"build",content:"A Solidity contract looks like a JavaScript class. It has a version declaration, a name, state variables (stored forever on chain), and functions.",project:'In Remix (remix.ethereum.org), create a new file called Hello.sol:\n\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.0;\n\ncontract Hello {\n    string public message = "Hello from the blockchain!";\n    \n    function setMessage(string memory newMsg) public {\n        message = newMsg;\n    }\n}\n\nCompile it (Ctrl+S). No errors = success.',recallQ:['What does "pragma solidity" specify?',"What makes a variable persistent in Solidity?"]},{id:"sol-2",title:"Deploy to a test network",duration:15,type:"build",content:"Deploying means putting your contract onto the blockchain. We'll use a test network — free fake ETH, real blockchain behavior.",project:'In Remix:\n1. Go to "Deploy & Run" tab (rocket icon)\n2. Environment > Injected Provider (uses MetaMask)\n3. Switch MetaMask to Sepolia testnet\n4. Get free test ETH from sepoliafaucet.com\n5. Click Deploy\n\nYour contract now lives on the blockchain.',recallQ:["What is a testnet?",'What is "deploying" a contract?']}]}]},{id:"cybersecurity",title:"Cybersecurity Basics",emoji:"🔐",color:"#ef4444",description:"Understand threats, defenses, and OSINT — skills directly relevant to your investigation work.",modules:[{id:"security-basics",title:"Fundamentals of Security",description:"How attacks work and how defenders think.",lessons:[{id:"sec-1",title:"The CIA Triad",duration:8,type:"read",content:"Every security decision maps to three principles: Confidentiality (only authorized access), Integrity (data isn't tampered with), Availability (systems stay up). This triad is how security professionals evaluate every threat.",project:"Think of three real-world examples:\n1. Something that violates Confidentiality\n2. Something that violates Integrity\n3. Something that violates Availability\n\nWrite them in a note. These concepts will appear everywhere in security.",recallQ:["What does CIA stand for in cybersecurity?","Give an example of an integrity violation."]},{id:"sec-2",title:"OSINT: Finding public information",duration:15,type:"build",content:"OSINT (Open Source Intelligence) is the art of finding public information systematically. It's used in investigations, security research, and journalism. You already do this — we're just formalizing it.",project:'Try these OSINT tools on yourself to see what\'s public:\n\n1. shodan.io — search your IP address\n2. haveibeenpwned.com — check if your email is in breaches\n3. Google: "site:linkedin.com YOUR NAME"\n4. whois lookup on any domain\n\nDocument what you find.',recallQ:["What does OSINT stand for?","Name two public OSINT tools."]}]}]}];var i=l("2xBnP");let p=[{label:"5 min",value:5},{label:"10 min",value:10},{label:"15 min",value:15},{label:"25 min",value:25}],m={1:"Really low. Just read today — no pressure to build.",2:"Low. Pick something easy.",3:"Okay. One lesson, no heroics.",4:"Good. Let's build something real.",5:"High. Time to make real progress."},h={border:"none",cursor:"pointer"};function g({state:e,onStartSession:t,dueRecall:n,onGoToRecall:r}){let[l,a]=(0,i.useState)(3),[s,
